<!DOCTYPE html>

<html lang="fr" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Météo</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="Img/logo.ico" />
</head>
<body>
    <!-----------------------------Navbar----------------------------->
    <div class="navbar">
        <div class="navbar-content">
            <div class="logo-container">
                <img src="Img/logo.png" class="logo" />
                <h2>Ma Météo</h2>
            </div>
            <div class="search-container">
                <input type="text" id="cityInput" placeholder="Entrez une ville ou un code postal" />
                <button class="offset" id="search-button">
                    Rechercher
                    <span class="icon">🔍</span>
                </button>
            </div>
        </div>
    </div>


    <!-----------------------------Affichage Météo----------------------------->
    <div class="container">
        <h1>Ma Météo</h1>

        <div id="weatherResult" class="hidden">
            <h2 id="cityName"></h2>
            <img id="weatherIcon" src="" alt="Icône météo" />
            <h2 id="temperature"></h2>
        </div>

        <div id="historySection" class="hidden">
            <h2>Historique</h2>
            <div id="history"></div>
        </div>
    </div>

    <!----------------------------Affichage Prévision--------------------------->
    <!--Contrôles et affichage des prédictions météo-->
    <div id="predictionSection" class="prediction-card hidden">
        <h2>Prévision IA</h2>

        <!--Contrôles-->
        <div id="predictionControls" class="prediction-controls hidden">
            <label for="predictionHours">Prévoir dans :</label>
            <input type="number" id="predictionHours" min="1" max="24" value="1">
            <button id="predict-button" type="button">Prédire</button>
        </div>

        <!--Affichage-->
        <div id="prediction" class="hidden">
            <p id="predictionValue" class="prediction-value"></p>
        </div>
    </div>

    <!--Diagramme des prédictions sur les 6 prochaines heures-->
    <div id="forecastChartSection" class="chart-card hidden">
        <h2>Évolution prévue sur les 6 prochaines heures</h2>
        <canvas id="forecastChart"></canvas>
    </div>

    <script src="meteo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
